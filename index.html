<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max Wilson Pereira</title>

    <style>
      /* Reset básico */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Helvetica Neue', sans-serif;
      }

      body {
        background: #1a1a1a; /* Dark background */
        color: #eee; /* Light text */
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: 100vh;
        padding: 20px;
      }

      .profile-img {
        margin-top: 40px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #1e90ff; /* Blue border */
      }

      h1 {
        margin: 20px 0 10px;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
      }

      p {
        margin: 0 20px 30px;
        font-size: 1rem;
        color: #ccc;
        line-height: 1.4;
      }

      .link-button {
        width: 90%;
        max-width: 380px;
        margin: 10px 0;
      }

      .link-button a {
        display: block;
        text-decoration: none;
        background: #1e90ff; /* Blue button */
        color: #fff;
        padding: 15px 0;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        transition:
          background 0.3s ease,
          transform 0.2s;
      }

      .link-button a:hover {
        background: #187bcd; /* Darker blue on hover */
        transform: scale(1.03);
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.6rem;
        }
        p {
          font-size: 0.95rem;
        }
        .link-button a {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <img
      src="assets\max_gigga.jpg"
      alt="Max Wilson Pereira"
      class="profile-img"
    />

    <h1>Max Wilson Pereira</h1>
    <p>Canto, paixão e entretenimento para tocar o seu coração ❤️</p>

    <div class="link-button">
      <a href="https://apoia.se/maxwilsonpereira" target="_blank">
        Apoie Minha Jornada
      </a>
    </div>

    <div class="link-button">
      <a
        href="https://maxwilsonpereira.hotmart.host/max-wilson-pereira-so-in-love-03d7467a-d750-40dd-8138-d69e1fcf0670"
        target="_blank"
      >
        Álbum SO IN LOVE + Bônus
      </a>
    </div>
  </body>
</html>
