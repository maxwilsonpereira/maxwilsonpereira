<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max Wilson Pereira</title>

    <!-- Force browser to always load latest version -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      /* Reset básico */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Helvetica Neue', sans-serif;
      }

      body {
        background: #1a1a1a; /* Dark background */
        color: #eee; /* Light text */
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: 100vh;
        padding: 20px;
      }

      .profile-img {
        margin-top: 40px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #1e90ff; /* Blue border */
      }

      h1 {
        margin: 20px 0 10px;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
      }

      p {
        margin: 0 20px 30px;
        font-size: 1rem;
        color: #ccc;
        line-height: 1.4;
      }

      .link-button {
        width: 90%;
        max-width: 380px;
        margin: 10px 0;
      }

      .link-button a {
        display: block;
        text-decoration: none;
        background: #1e90ff; /* Blue button */
        color: #fff;
        padding: 15px 4px;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        transition:
          background 0.3s ease,
          transform 0.2s;
      }

      .link-button a:hover {
        background: #187bcd; /* Darker blue on hover */
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.6rem;
        }
        p {
          font-size: 0.95rem;
        }
        .link-button a {
          font-size: 1rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- Profile image -->
    <img
      src="assets/max_gigga.jpg"
      alt="Max Wilson Pereira"
      class="profile-img"
    />

    <!-- Name and tagline -->
    <h1>Max Wilson Pereira</h1>
    <p><b>Canto, paixão e entretenimento para tocar o seu coração</b> ❤️</p>

    <!-- Link buttons -->
    <div class="link-button">
      <a href="https://apoia.se/maxwilsonpereira?v=1.0.1" target="_blank">

      </a>
    </div>

    <div class="link-button">

    </div>

    <div class="link-button">

      >
